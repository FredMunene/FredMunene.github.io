<figure class="post-image">
  <picture>
    {% if include.avif %}
      <source srcset="{{ include.avif | relative_url }}" type="image/avif" />
    {% endif %}
    {% if include.webp %}
      <source srcset="{{ include.webp | relative_url }}" type="image/webp" />
    {% endif %}
    <img src="{{ include.src | relative_url }}" alt="{{ include.alt | escape }}" loading="lazy" />
  </picture>
  {% if include.caption %}
    <figcaption>{{ include.caption }}</figcaption>
  {% endif %}
</figure>
